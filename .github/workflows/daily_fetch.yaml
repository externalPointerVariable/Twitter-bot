name: Daily Trends Fetcher

on:
  schedule:
    # Runs at 00:17 UTC (~5:47 AM IST) to avoid the top-of-the-hour traffic jam
    - cron: "17 0 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Run Fetch Script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node Fetch_Trends.js
